body{padding-bottom:calc(82px + env(safe-area-inset-bottom));min-height:100vh}
.dsp{font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:-.01em}

.wrap{padding:0 16px;max-width:520px;margin:0 auto}

.brand{display:flex;align-items:center;gap:9px}
.logo{width:30px;height:30px;border-radius:9px;background:var(--bg2);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center}
.logo svg{width:18px;height:18px}

.brand span{display:block;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.12em;margin-top:-2px}
.card{background:linear-gradient(165deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 6px 26px -14px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.03)}
.fade{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}.stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}.stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}.stagger>*:nth-child(7){animation-delay:.32s}.stagger>*:nth-child(8){animation-delay:.37s}

.nav button.on{color:var(--lime)}

.nav button.on svg{transform:translateY(-1px)}
.nav small{font-size:9.5px;font-weight:700;letter-spacing:.02em}

.btn-lime{background:var(--lime);color:#10131F}
.btn-ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
.zbadge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:7px;font-family:'Archivo';letter-spacing:.03em}
.glow{box-shadow:0 0 0 1px rgba(116,232,195,.22),0 10px 36px -14px rgba(116,232,195,.4),inset 0 1px 0 rgba(255,255,255,.04)}
.divline{height:1px;background:var(--line);margin:14px 0}
.chk{width:30px;height:30px;border-radius:9px;border:2px solid var(--muted2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .2s}
.chk.on{background:var(--lime);border-color:var(--lime)}
.chk svg{width:17px;height:17px;stroke:#10131F;stroke-width:3.2;fill:none;opacity:0;transition:opacity .2s}
.chk.on svg{opacity:1}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fade .25s ease}

@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.grab{width:38px;height:4px;border-radius:9px;background:var(--line);margin:8px auto 14px}
.linkbtn{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);color:var(--lime);text-decoration:none;padding:8px 12px;border-radius:10px;font-size:12.5px;font-weight:700}
.seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px}
.seg button{flex:1;border:none;background:none;color:var(--muted);font-weight:700;font-size:12.5px;padding:8px 4px;border-radius:9px;cursor:pointer;transition:all .2s}

.topo{position:absolute;inset:0;opacity:.5;pointer-events:none;background-image:radial-gradient(circle at 1px 1px,rgba(116,232,195,.06) 1px,transparent 0);background-size:24px 24px}
.langbtn{border:1px solid var(--line);background:var(--card2);border-radius:9px;padding:6px 9px;font-family:'Archivo';font-weight:800;font-size:11px;cursor:pointer;color:var(--lime);letter-spacing:.04em}

 const consistency=pSess?Math.min(1,dSess/pSess):0;

}

function openReadiness(){

 draw();showSheet(sheet);

function showSheet(sheet){const bg=$('<div class="modal-bg"></div>');bg.appendChild(sheet);bg.onclick=e=>{if(e.target===bg)closeSheet();};document.body.appendChild(bg);document.body.style.overflow="hidden";window._sheet=bg;}
function closeSheet(){if(window._sheet){window._sheet.remove();window._sheet=null;document.body.style.overflow="";}}

function parseActivity(text){
 let doc;try{doc=new DOMParser().parseFromString(text,'application/xml');}catch(e){return null;}
 if(doc.getElementsByTagName('parsererror').length)return null;
 const T=(root,name)=>[...root.getElementsByTagName('*')].filter(e=>e.localName===name);
 let pts=[];
 const trkpt=T(doc,'trkpt');
 if(trkpt.length){
  trkpt.forEach(p=>{const lat=parseFloat(p.getAttribute('lat')),lon=parseFloat(p.getAttribute('lon'));const ele=T(p,'ele')[0],hr=T(p,'hr')[0],tm=T(p,'time')[0];pts.push({lat,lon,ele:ele?parseFloat(ele.textContent):null,hr:hr?parseFloat(hr.textContent):null,time:tm?Date.parse(tm.textContent):null});});
 }else{
  const tp=T(doc,'Trackpoint');if(!tp.length)return null;
  tp.forEach(p=>{const pos=T(p,'Position')[0];let lat=null,lon=null;if(pos){const la=T(pos,'LatitudeDegrees')[0],lo=T(pos,'LongitudeDegrees')[0];lat=la?parseFloat(la.textContent):null;lon=lo?parseFloat(lo.textContent):null;}const ele=T(p,'AltitudeMeters')[0],dist=T(p,'DistanceMeters')[0],hrEl=T(p,'HeartRateBpm')[0],tm=T(p,'Time')[0];let hr=null;if(hrEl){const v=T(hrEl,'Value')[0];hr=v?parseFloat(v.textContent):parseFloat(hrEl.textContent);}pts.push({lat,lon,ele:ele?parseFloat(ele.textContent):null,dist:dist?parseFloat(dist.textContent):null,hr,time:tm?Date.parse(tm.textContent):null});});
 }
 if(!pts.length)return null;
 let km=0;const haveDist=pts.some(p=>p.dist!=null);
 if(haveDist){const ds=pts.filter(p=>p.dist!=null).map(p=>p.dist);km=(Math.max(...ds)-Math.min(...ds))/1000;}
 else{const H=(a,b)=>{const R=6371000,r=Math.PI/180,dLa=(b.lat-a.lat)*r,dLo=(b.lon-a.lon)*r,la1=a.lat*r,la2=b.lat*r,x=Math.sin(dLa/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(x));};let m=0;for(let i=1;i<pts.length;i++){if(pts[i].lat!=null&&pts[i-1].lat!=null)m+=H(pts[i-1],pts[i]);}km=m/1000;}
 let eles=pts.map(p=>p.ele).filter(e=>e!=null&&!isNaN(e));let vert=0;
 if(eles.length>2){const sm=[];for(let i=0;i<eles.length;i++)sm.push((eles[Math.max(0,i-1)]+eles[i]+eles[Math.min(eles.length-1,i+1)])/3);let prev=sm[0];for(let i=1;i<sm.length;i++){const d=sm[i]-prev;if(d>=0.7){vert+=d;prev=sm[i];}else if(d<0)prev=sm[i];}}
 const hrs=pts.map(p=>p.hr).filter(h=>h!=null&&!isNaN(h)&&h>0);
 const hrAvg=hrs.length?Math.round(hrs.reduce((a,b)=>a+b,0)/hrs.length):null;
 const hrMax=hrs.length?Math.max(...hrs):null;
 const times=pts.map(p=>p.time).filter(t=>t!=null&&!isNaN(t));
 const dur=times.length>=2?Math.round((Math.max(...times)-Math.min(...times))/1000):null;
 if(km<=0&&vert<=0&&!hrAvg)return null;
 return{km:Math.round(km*100)/100,vert:Math.round(vert),hrAvg,hrMax,dur};
}
function fmtDur(s){if(s==null)return'';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h ${m}m`:`${m}m`;}
function openSession(s){

 sheet.appendChild($('<div class="divline"></div>'));
 if(isInput(s.t)){const dbtn=$(`<button class="btn ${dn?'btn-ghost':'btn-lime'} tap">${dn?t('doneToggle'):t('completeBtn')}</button>`);dbtn.onclick=()=>{S.done[s.id]=!dn;save();closeSheet();openSession(SESS.find(x=>x.id===s.id));render();};sheet.appendChild(dbtn);
  if(s.km>0){const fi=$(`<input type="file" accept=".gpx,.tcx,application/gpx+xml,application/xml" style="display:none">`);const ib=$(`<button class="btn btn-ghost tap" style="margin-top:9px">${t('importBtn')}</button>`);ib.onclick=()=>fi.click();
   fi.onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{const r=parseActivity(String(rd.result));if(!r){window._importMsg={err:1};}else{S.done[s.id]=true;const cur=S.actual[s.id]||{};S.actual[s.id]=Object.assign({},cur,{km:r.km,v:r.vert,hra:r.hrAvg!=null?r.hrAvg:cur.hra,hrm:r.hrMax!=null?r.hrMax:cur.hrm});window._importMsg={r};save();}closeSheet();openSession(SESS.find(x=>x.id===s.id));render();};rd.readAsText(f);};
   sheet.appendChild(ib);sheet.appendChild(fi);sheet.appendChild($(`<div style="font-size:10.5px;color:var(--muted2);text-align:center;margin-top:5px;line-height:1.4">${t('importHint')}</div>`));
   if(window._importMsg){const im=window._importMsg;window._importMsg=null;if(im.err)sheet.appendChild($(`<div class="card" style="margin-top:9px;border-color:${cv('--bad')}55;background:${cv('--bad')}12;font-size:12.5px;color:${cv('--bad')};text-align:center">${t('importFail')}</div>`));else{const r=im.r;sheet.appendChild($(`<div class="card" style="margin-top:9px;border-color:${cv('--lime')}66;background:${cv('--lime')}12;font-size:12.5px;text-align:center;line-height:1.6">✓ ${t('importDone')}<br><b style="font-size:14px">${r.km} km · +${r.vert} m</b>${r.hrAvg?` · HR ${r.hrAvg}/${r.hrMax}`:''}${r.dur?` · ${fmtDur(r.dur)}`:''}</div>`));}}
  }
  if(dn){const fields=s.km>0?[["km",t('kmActual')],["v",t('vertActual')],["rpe",t('rpeL')]]:[["rpe",t('rpeL')]];const g=$(`<div style="display:grid;grid-template-columns:${s.km>0?'1fr 1fr 1fr':'1fr'};gap:8px;margin-top:12px"></div>`);fields.forEach(([f,ph])=>{const wp=$(`<div><div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">${ph}</div></div>`);const inp=$(`<input class="in" type="number" inputmode="decimal" value="${a[f]||''}">`);inp.oninput=e=>{S.actual[s.id]=Object.assign({},S.actual[s.id],{[f]:e.target.value});save();};wp.appendChild(inp);g.appendChild(wp);});sheet.appendChild(g);
   if(s.km>0){const hg=$('<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"></div>');[["hra",t('hrAvgL')],["hrm",t('hrMaxL')]].forEach(([f,ph])=>{const wp=$(`<div><div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:4px">${ph}</div></div>`);const inp=$(`<input class="in" type="number" inputmode="numeric" value="${a[f]||''}">`);inp.oninput=e=>{S.actual[s.id]=Object.assign({},S.actual[s.id],{[f]:e.target.value});save();closeSheet();openSession(SESS.find(x=>x.id===s.id));};wp.appendChild(inp);hg.appendChild(wp);});sheet.appendChild(hg);
    const hav=parseFloat(a.hra);if(!isNaN(hav)){const Z=zones().find(z=>hav<=z.hi)||zones()[zones().length-1];const zc=cv(Z.col);sheet.appendChild($(`<div style="margin-top:8px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)">${t('hrZoneNote')}: <span class="zbadge" style="background:${zc}22;color:${zc}">${Z.z}</span> <span style="color:${zc};font-weight:700">${tx(Z.name)}</span></div>`));}}
   const nt=$(`<textarea class="in" rows="2" placeholder="${t('notePlaceholder')}" style="margin-top:8px;resize:none">${a.note||''}</textarea>`);nt.oninput=e=>{S.actual[s.id]=Object.assign({},S.actual[s.id],{note:e.target.value});save();};sheet.appendChild(nt);}}

   const ab=$(`<button class="btn btn-lime tap">${t('saveMenu')}</button>`);
   ab.onclick=()=>{const k=parseFloat(kc.value);if(!nm.value||isNaN(k))return;const item={id:'c'+Date.now(),cat:ncat,n:{th:nm.value,en:nm.value},kcal:k,p:parseFloat(pr.value)||0,c:parseFloat(cb.value)||0};if(!S.customFoods)S.customFoods=[];S.customFoods.push(item);save();pickServings(item);};
   f.appendChild(nm);f.appendChild(kc);f.appendChild(pr);f.appendChild(cb);f.appendChild(ab);list.appendChild(f);return;
  }
  let items=allFoods().filter(x=>x.cat===cat);

  items.forEach(it=>{const isCustom=it.id&&it.id[0]==='c';const row=$(`<div class="card" style="padding:11px 13px;display:flex;align-items:center;gap:9px"><div class="tap" style="flex:1;cursor:pointer"><div style="font-weight:700;font-size:13.5px">${tx(it.n)}${isCustom?' <span style="color:var(--lav);font-size:10px;font-weight:800">●</span>':''}</div><div style="font-size:11px;color:var(--muted)">${it.kcal} kcal · P ${it.p} · C ${it.c} ${t('perServe')}</div></div></div>`);row.querySelector('.tap').onclick=()=>pickServings({n:it.n,kcal:it.kcal,p:it.p,c:it.c});const eb=$(`<button class="tap" style="border:none;background:var(--bg2);width:30px;height:30px;border-radius:9px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center">${ic('<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4z"/>',cv('--muted'),15)}</button>`);eb.onclick=()=>openFoodEdit(it);const addb=$(`<button class="tap" style="border:none;background:var(--lime);width:30px;height:30px;border-radius:9px;color:#10131F;cursor:pointer;font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center">+</button>`);addb.onclick=()=>pickServings({n:it.n,kcal:it.kcal,p:it.p,c:it.c});row.appendChild(eb);row.appendChild(addb);list.appendChild(row);});
  if(!items.length)list.appendChild($(`<div style="text-align:center;color:var(--muted2);font-size:13px;padding:16px">— ${t('cat_custom')} —</div>`));
 }

function openFoodEdit(it){
 const isCustom=it.id&&it.id[0]==='c';

function recentLowReadiness(){
 // count consecutive days (ending today) with readiness saved and tot<5
 let streak=0;for(let i=0;i<5;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);const r=S.readiness[k];if(r&&r.tot<5)streak++;else if(i===0&&!r)continue;else break;}
 return streak;
}
function missedSessions(){
 const ti=todayIndex();let m=0;for(let i=0;i<ti;i++){const s=SESS[i];if(isInput(s.t)&&s.km>0&&!S.done[s.id])m++;}return m;
}
function adaptiveSuggestion(){
 if(niggleAlerts().length)return{key:'niggle',col:'--bad',emoji:'🩹',msg:t('adapt_niggle'),canEase:true};
 const lr=recentLowReadiness();if(lr>=2)return{key:'readiness',col:'--warn',emoji:'😴',msg:t('adapt_readiness').replace('{n}',lr),canEase:true};
 const ms=missedSessions();if(ms>=3)return{key:'missed',col:'--z3',emoji:'⏭',msg:t('adapt_missed').replace('{n}',ms),canEase:false};
 return{key:'ok',col:'--lime',emoji:'✅',msg:t('adapt_ok'),canEase:false};
}
function isEased(id){return !!(S.eased&&S.eased[id]);}
function coachInsight(){
 const s=SESS[todayIndex()];const r=readinessToday();
 let base;
 if(niggleAlerts().length){base={emoji:'🩹',col:'--bad',msg:t('co_physio')};}
 else if(r&&r.tot<3){base={emoji:'🛌',col:'--bad',msg:t('co_rest_rd')};}
 else if(r&&r.tot<5){base={emoji:'⚠️',col:'--warn',msg:t('co_easy_rd')};}
 else if(!r&&isInput(s.t)){base={emoji:'🌅',col:'--z1',msg:t('co_checkrd')};}
 else{const et=energyType(s.t);
  if(s.t==='Rest')base={emoji:'🌙',col:'--z2',msg:t('co_rest')};
  else if(s.t==='Race')base={emoji:'🏁',col:'--orange',msg:t('co_race')};
  else if(et==='long')base={emoji:'🥤',col:'--lime',msg:t('co_long')};
  else if(s.t==='Downhill'||s.t==='Hill')base={emoji:'⛰',col:'--z3',msg:t('co_down')};
  else if(et==='quality')base={emoji:'⚡',col:'--z3',msg:t('co_quality')};
  else base={emoji:'🏃',col:'--lime',msg:t('co_easy')};
 }
 // fuel nudge
 const ftot=foodTotals(todayStr()),ftg=foodTarget(todayStr());
 if(ftot.kcal>0&&ftot.kcal<ftg.lo*0.6&&s.t!=='Rest')base.msg+=t('co_fuellow');
 return base;
}
function waterToday(){return (S.water&&S.water[todayStr()])||0;}
function waterTarget(){const s=SESS[todayIndex()];return (s.t==='Long'||s.t==='B2B')?3500:(s.km>0?2800:2500);}
function notifications(){
 const out=[];
 niggleAlerts().forEach(a=>{const am=NIGGLE_AREAS.find(x=>x.th===a[0]||x.en===a[0]);out.push({emoji:'🩹',col:'--bad',title:(am?tx(am):a[0])+' '+t('niggleWarn')+' '+a[1]+'×',sub:t('niggleWarnSub'),act:()=>{tab='log';window._logTab='niggle';}});});
 if(daysSinceBackup()>=7)out.push({emoji:'💾',col:'--warn',title:t('notifBackup'),sub:tx(UI.backupReminderSub)(daysSinceBackup()),act:()=>{doExport();}});
 if(!readinessToday())out.push({emoji:'🌅',col:'--z1',title:t('notifReady'),sub:t('notifReadySub'),act:()=>{openReadiness();}});
 const fkey=todayStr();if(!(S.food&&S.food[fkey]&&S.food[fkey].length))out.push({emoji:'🍽',col:'--lime',title:t('notifFood'),sub:t('notifFoodSub'),act:()=>{tab='fuel';window._fuelTab='food';foodPtr=null;}});
 return out;
}
function openRRS(){
 const rr=raceReadiness();const rv=rrsVerdict(rr.score);const rvc=cv(rv.c);
 const sheet=$(`<div class="sheet"><div class="grab"></div></div>`);
 sheet.appendChild($(`<div style="text-align:center;margin-bottom:6px"><div style="position:relative;width:120px;height:120px;margin:0 auto">${ring(rr.score/100,120,11,rvc)}<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div class="num" style="font-size:38px;color:${rvc}">${rr.score}</div><div style="font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.05em">/ 100</div></div></div><div class="dsp" style="font-size:17px;color:${rvc};margin-top:8px">${rv.e} ${t('rrsTitle')}</div><div style="font-size:12.5px;color:var(--muted);margin-top:3px;padding:0 10px">${rv.t}</div></div>`));
 const list=$('<div style="margin-top:14px;display:flex;flex-direction:column;gap:10px"></div>');
 const sorted=[...rr.comps].sort((a,b)=>a.pct-b.pct);const focusKey=sorted[0].key;
 rr.comps.forEach(c=>{const cc=cv(c.col);const isFocus=c.key===focusKey&&c.pct<0.7;list.appendChild($(`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:12.5px;font-weight:700">${t('rrs_'+c.key)}${isFocus?` <span class="pill" style="background:${cv('--orange')}22;color:${cv('--orange')};margin-left:4px">${t('rrsFocus')}</span>`:''}</span><span class="num" style="font-size:13px;color:${cc}">${Math.round(c.pct*100)}<span style="font-size:9px;color:var(--muted)">% · ${Math.round(c.w*100)}%</span></span></div><div class="bar" style="height:7px"><i style="width:${c.pct*100}%;background:${cc}"></i></div></div>`));});
 sheet.appendChild(list);
 sheet.appendChild($(`<div style="font-size:10.5px;color:var(--muted2);text-align:center;margin-top:14px;line-height:1.5">${LANG==='th'?'ตัวเลขขวา = น้ำหนักของแต่ละด้านในคะแนนรวม · วัดเทียบกับ “สิ่งที่ควรทำถึงตอนนี้” ไม่ใช่ทั้งแผน':'Right number = weight in total score · measured vs “what should be done by now”, not the whole plan'}</div>`));
 showSheet(sheet);
}

function openSettings(){
 const sheet=$(`<div class="sheet"><div class="grab"></div><div class="dsp" style="font-size:20px;margin-bottom:14px">${t('setTitle')}</div></div>`);
 const fld=(label,el)=>{const w=$(`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">${label}</div></div>`);w.appendChild(el);return w;};
 const sd=$(`<input class="in" type="date" value="${S.startDate}">`);sd.onchange=e=>{S.startDate=e.target.value;save();closeSheet();render();};sheet.appendChild(fld(t('startDate'),sd));
 const rd=$(`<input class="in" type="date" value="${S.raceDate}">`);rd.onchange=e=>{S.raceDate=e.target.value;save();closeSheet();render();};sheet.appendChild(fld(t('raceDateL'),rd));
 const hm=$(`<input class="in" type="number" inputmode="numeric" placeholder="${HRMAX_DEFAULT}" value="${S.hrmax||''}">`);hm.oninput=e=>{S.hrmax=e.target.value;save();};const hmWrap=fld(t('maxhrL')+' '+HRMAX_DEFAULT,hm);hmWrap.appendChild($(`<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5">${t('maxhrHint')}</div>`));sheet.appendChild(hmWrap);
 const swi=$(`<input class="in" type="number" inputmode="decimal" placeholder="${START_WEIGHT_DEFAULT}" value="${S.startWeight||''}">`);swi.oninput=e=>{S.startWeight=e.target.value;save();};sheet.appendChild(fld(t('startWeightL'),swi));
 const twi=$(`<input class="in" type="number" inputmode="decimal" placeholder="${TARGET_WEIGHT_DEFAULT}" value="${S.targetWeight||''}">`);twi.oninput=e=>{S.targetWeight=e.target.value;save();};const twWrap=fld(t('targetWeightL'),twi);twWrap.appendChild($(`<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5">${t('targetHint')}</div>`));sheet.appendChild(twWrap);
 sheet.appendChild($('<div class="divline"></div>'));
 const riRows=[[{th:"ระยะ",en:"Distance"},"72.59 km"],[{th:"Elevation",en:"Elevation"},"+3,586 / −3,598 m"],[{th:"Cut-off",en:"Cut-off"},LANG==="th"?"15 ชม.":"15 h"],[{th:"ออกตัว",en:"Start"},LANG==="th"?"16:00 (กลางคืน)":"16:00 (night)"],[{th:"Aid",en:"Aid"},LANG==="th"?"3 จุด":"3 stations"],[{th:"ITRA",en:"ITRA"},"Mtn Level 6"]];
 let riHtml="";riRows.forEach((r,j)=>{riHtml+='<div style="display:flex;justify-content:space-between;padding:5px 0;'+(j<5?'border-bottom:1px solid var(--line)':'')+'"><span style="font-size:12.5px;color:var(--muted)">'+tx(r[0])+'</span><span style="font-size:12.5px;font-weight:700">'+r[1]+'</span></div>';});
 sheet.appendChild($(`<div class="card" style="background:var(--bg);margin-bottom:14px"><div class="dsp" style="font-size:14px;margin-bottom:8px">${t('raceInfo')}</div>${riHtml}</div>`));
 sheet.appendChild($(`<div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px">${t('backupSection')}${S.lastBackup?' · '+t('backupLast')+' '+daysSinceBackup()+' '+t('backupDaysAgo'):''}</div>`));
 const bk=$('<div style="display:flex;gap:9px"></div>');const exp=$(`<button class="btn btn-lime tap" style="flex:1">${t('export')}</button>`);exp.onclick=()=>{doExport();closeSheet();render();};const imp=$(`<button class="btn btn-ghost tap" style="flex:1">${t('import')}</button>`);imp.onclick=()=>{const f=document.createElement('input');f.type='file';f.accept='.json';f.onchange=e=>{const rd2=new FileReader();rd2.onload=()=>{try{S=Object.assign(S,JSON.parse(rd2.result));LANG=S.lang||LANG;save();closeSheet();render();}catch(err){alert(t('badFile'));}};rd2.readAsText(e.target.files[0]);};f.click();};bk.appendChild(exp);bk.appendChild(imp);sheet.appendChild(bk);
 sheet.appendChild($(`<div style="font-size:11px;color:var(--muted2);text-align:center;margin-top:16px;line-height:1.5">${t('disclaimer')}</div>`));
 showSheet(sheet);
}
function openNiggle(){
 let area=NIGGLE_AREAS[0],sev=1,note="";
 const sheet=$(`<div class="sheet"><div class="grab"></div><div class="dsp" style="font-size:19px;margin-bottom:14px">${t('niggleSheetTitle')}</div></div>`);
 const ab=$(`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${t('area')}</div></div>`);const ag=$('<div style="display:flex;flex-wrap:wrap;gap:7px"></div>');NIGGLE_AREAS.forEach((a,ai)=>{const b=$(`<button class="pill tap" data-i="${ai}" style="cursor:pointer;border:1px solid var(--line);background:${a===area?cv('--lime'):'var(--bg2)'};color:${a===area?'#10131F':'var(--txt)'};padding:8px 13px">${tx(a)}</button>`);b.onclick=()=>{area=a;ag.querySelectorAll('button').forEach((x,xi)=>{const on=NIGGLE_AREAS[xi]===area;x.style.background=on?cv('--lime'):cv('--bg2');x.style.color=on?'#10131F':cv('--txt');});};ag.appendChild(b);});ab.appendChild(ag);sheet.appendChild(ab);
 sheet.appendChild($(`<div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">${t('level')}</div>`));const sg=$('<div class="seg" style="margin-bottom:14px"></div>');[t('sev1'),t('sev2'),t('sev3')].forEach((l,i)=>{const val=i+1;const b=$(`<button class="${val===sev?'on':''}">${l}</button>`);b.onclick=()=>{sev=val;sg.querySelectorAll('button').forEach((x,j)=>x.className=(j+1)===sev?'on':'');};sg.appendChild(b);});sheet.appendChild(sg);
 const nt=$(`<textarea class="in" rows="2" placeholder="${t('niggleNotePh')}" style="resize:none;margin-bottom:14px"></textarea>`);nt.oninput=e=>note=e.target.value;sheet.appendChild(nt);

if('serviceWorker' in navigator){try{const swCode="const C='rtc70-v2';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>{const f=fetch(e.request).then(res=>{if(res&&res.status===200)c.put(e.request,res.clone());return res}).catch(()=>r);return r||f})))});";const blob=new Blob([swCode],{type:'text/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});}catch(e){}}
render();
